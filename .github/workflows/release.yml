name: release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build release jar
        run: ./gradlew --no-daemon clean build

      - name: compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(grep '^mod_version=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')"
          if [[ -z "${VERSION}" ]]; then
            echo "Failed to read mod_version from gradle.properties" >&2
            exit 1
          fi

          BASE_TAG="v${VERSION}"
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SAFE_BRANCH_NAME="$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/ _' '---' | tr -cd 'a-z0-9.-')"
          TAG="${BASE_TAG}"
          PRERELEASE="false"
          MAKE_LATEST="true"

          if [[ "${BRANCH_NAME}" != "main" ]]; then
            TAG="${BASE_TAG}-${SAFE_BRANCH_NAME}.run.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
            PRERELEASE="true"
            MAKE_LATEST="false"
          fi

          # If the base tag already exists, generate a unique fallback tag
          # so each main push can still publish a release artifact.
          if [[ "${BRANCH_NAME}" == "main" ]] && git ls-remote --exit-code --tags origin "refs/tags/${BASE_TAG}" >/dev/null 2>&1; then
            TAG="${BASE_TAG}-run.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
            MAKE_LATEST="false"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, refusing to overwrite." >&2
            exit 1
          fi

          JAR_PATH="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar' | head -n 1)"
          if [[ -z "${JAR_PATH}" ]]; then
            echo "No release jar found in build/libs" >&2
            ls -la build/libs || true
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "base_tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "make_latest=${MAKE_LATEST}" >> "$GITHUB_OUTPUT"
          echo "jar_path=${JAR_PATH}" >> "$GITHUB_OUTPUT"

      - name: create and push tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Weapilics ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          overwrite_files: true
          files: ${{ steps.meta.outputs.jar_path }}
